<!DOCTYPE html>
<html>
 <head>
  <title>Radar</title>

  <script type="text/javascript">
     var ws = new WebSocket('ws://'+location.host+'/ws/radar1/');
     function keepAlive(timeout = 25000) { 
       /* console.log('keepAlive called!\n');  /* */
       /* console.log(ws.readyState);	/* */
       if (ws.readyState == ws.OPEN) {  
         ws.send('\n');  
       }  
       else {
         /* console.log('Try to re-connect!\n');  /* */
         ws = new WebSocket('ws://'+location.host+'/ws/radar1/');
         ws.onmessage = got_message;
         ws.onerror = got_error;
       }
       timerId = setTimeout(keepAlive, timeout);  
     };

     function got_error(event) {
	document.getElementById('speed').textContent = "lost";
     };

     function got_message(event) {
        //document.getElementById('response').textContent = event.data;
	the_data = event.data.split(" ");
	num = -1;
	for (let i=0; i < the_data.length; i++) {
	   switch (the_data[i].substring(0,1)) {
	     case "S":
		speed = the_data[i].substring(1);
		document.getElementById('speed').textContent = speed;
		break;
	     case "M":
		max_speed = the_data[i].substring(1);
		document.getElementById('Max').textContent = max_speed;
		break;
	     case "C":
		cnr_speed = the_data[i].substring(1);
		document.getElementById('Cnr').textContent = cnr_speed;
		break;
	   }
	}
       //ws.send(' ');
     }
     ws.onmessage = got_message;
     ws.onerror = got_error;
     keepAlive(1000); /* */
     /* console.log('console test!\n');  /* */

  </script>

 </head>
 <body>
   <table>
    <tr> <th colspan=2 style="font-size:160%"> Max </th> </tr>
    <tr> <th colspan=2 style="font-size:180%" id="Max"> waiting </th> </tr>
    <tr> <th width=80> Current </th> <th width=80> Corner? </th></tr>
    <tr> <th style="font-size:140%" id="speed"> -.- </th> <th style="font-size:140%" id="Cnr"> -.- </th> </tr>
   </table>
 </body>
</html>

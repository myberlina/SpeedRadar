<!DOCTYPE html>
<html>
 <head>
  <title>Radar</title>

  <style>
        th, td {
              padding-top: 10px;
              padding-bottom: 10px;
              padding-left: 40px;
              padding-right: 50px;
        }
  </style>


  <script type="text/javascript">
     var ws = new WebSocket('ws://'+location.host+'/ws/radar1-slow/');
     function keepAlive(timeout = 25000) { 
       /* console.log('keepAlive called!\n');  /* */
       /* console.log(ws.readyState);	/* */
       if (ws.readyState == ws.OPEN) {  
         ws.send('\n');  
       }  
       else {
         /* console.log('Try to re-connect!\n');  /* */
         ws = new WebSocket('ws://'+location.host+'/ws/radar1-slow/');
         ws.onmessage = got_message;
         ws.onerror = got_error;
       }
       timerId = setTimeout(keepAlive, timeout);  
     };

     function got_error(event) {
	document.getElementById('Max').textContent = "lost";
     };

     function got_message(event) {
	the_data = event.data.split(" ");
	num = -1;
	for (let i=0; i < the_data.length; i++) {
	   switch (the_data[i].substring(0,1)) {
	     case "M":
		max_speed = the_data[i].substring(1);
		document.getElementById('Max').textContent = max_speed;
		break;
	   }
	}
     }
     ws.onmessage = got_message;
     ws.onerror = got_error;
     keepAlive(1000); /* */
  </script>

 </head>
 <body>
   <table align="center">
    <tr> <th style="font-size:500%"> Max </th> <th> &nbsp; </th> </tr>
    <tr> <th style="font-size:750%" id="Max"> waiting </th> </tr>
   </table>
 </body>
</html>
